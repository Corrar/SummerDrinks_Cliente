/* ============================================================
   Summer Drinks — estilos globais
   Apenas o que não pode ser inline: variáveis de tema, keyframes,
   resets e ajustes de scrollbar/placeholder. O restante do estilo
   vive em `style={{}}` nos componentes (padrão do design original).
   ============================================================ */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  background: #0d0a07;
  font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ---- Tema (escopo .sd-app) ---- */
.sd-app {
  --bg: #16120d;
  --bg-2: #13100b;
  --surface: #1c1710;
  --surface-2: #211b13;
  --input: #0f0c08;
  --sheet: #1a150e;
  --backdrop: #0d0a07;
  --backdrop-2: #221a10;
  --ink: 246, 239, 226;
}

.sd-app[data-theme='light'] {
  --bg: #fbf5ec;
  --bg-2: #f1e8d8;
  --surface: #ffffff;
  --surface-2: #f0e6d4;
  --input: #f5edde;
  --sheet: #fffaf2;
  --backdrop: #e9e0cf;
  --backdrop-2: #f4ecdc;
  --ink: 42, 30, 16;
}

/* ---- Transições suaves de tema ---- */
.sd-app *,
.sd-app *::before,
.sd-app *::after {
  transition: background-color 0.32s ease, color 0.3s ease, border-color 0.32s ease,
    fill 0.28s ease, stroke 0.28s ease;
}
.sd-app button {
  transition: background-color 0.3s ease, color 0.28s ease, border-color 0.3s ease,
    transform 0.14s ease;
}
.sd-app button:active {
  transform: scale(0.955);
}
button {
  -webkit-tap-highlight-color: transparent;
}

/* ---- Scrollbars ocultas ---- */
.sd-scroll::-webkit-scrollbar {
  width: 0;
  height: 0;
}
.sd-scroll {
  scrollbar-width: none;
}

input::placeholder,
textarea::placeholder {
  color: rgba(var(--ink), 0.32);
}
input:focus,
textarea:focus,
select:focus {
  outline: none;
}

/* ---- Animações ---- */
@keyframes sdRise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: none; }
}
@keyframes sdSheet {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
@keyframes sdPop {
  0% { transform: scale(0.85); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes sdFade {

  to { opacity: 1; }
}
@keyframes sdToastIn {

  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes sdMenuIn {

}
@keyframes sdBellRing {

  20% { transform: rotate(16deg); }
  40% { transform: rotate(-13deg); }
  60% { transform: rotate(8deg); }

@keyframes sdSpin {

@keyframes sdCheckPop {

/* ===== lib/format.js ===== */
/** Formata um número como moeda brasileira: 25 -> "R$ 25,00". */
function brl(n) {
  return 'R$ ' + Number(n).toFixed(2).replace('.', ',');
}

/** Formata o horário de um pedido: "Hoje · 14:32" ou "05/07 · 14:32". */
function formatOrderTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const sameDay = d.toDateString() === now.toDateString();
  const day = sameDay
    ? 'Hoje'
    : String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0');
  return day + ' · ' + hh + ':' + mm;
}


/* ===== lib/storage.js ===== */
/** Lê e faz parse de JSON do localStorage, retornando `fallback` em erro. */
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw == null ? fallback : JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}

/** Serializa e grava um valor no localStorage (silencioso em erro). */
function saveJSON(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    /* quota / modo privado — ignora */
  }
}

/** Dias totalmente ocupados, por chave "ano-mês". */
const OCUPADO = { '2026-5': [27, 28], '2026-6': [4, 11, 18, 25] };

/** Dias parcialmente ocupados (algum horário livre). */
const PARCIAL = { '2026-5': [25, 26, 30], '2026-6': [3, 5, 12, 19, 26] };

/** Data de referência (hoje) usada para bloquear datas passadas. */
const TODAY = { y: 2026, m: 5, d: 24 };

/** Cor de cada status de disponibilidade. */
const STATUS_COLOR = { livre: '#b6e84c', parcial: '#f5a623', ocupado: '#e23b3b' };

/**
 * Retorna o status de uma data:
 * 'past' | 'ocupado' | 'parcial' | 'livre'.
 */
function statusOf(y, m, d) {
  const ts = Date.UTC(y, m, d);
  const today = Date.UTC(TODAY.y, TODAY.m, TODAY.d);
  if (ts < today) return 'past';
  const key = y + '-' + m;
  if ((OCUPADO[key] || []).includes(d)) return 'ocupado';
  if ((PARCIAL[key] || []).includes(d)) return 'parcial';
  return 'livre';
}

   ============================================================ */

function Svg({ size = 20, stroke = 2, fill = 'none', children, ...rest }) {
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill={fill}
      stroke={fill === 'none' ? 'currentColor' : 'none'}
      strokeWidth={fill === 'none' ? stroke : undefined}
      strokeLinecap="round"
      strokeLinejoin="round"
      {...rest}
    >
      {children}
    </svg>
  );
}

/* ===== hooks/useLocalStorage.js ===== */

/**
 * useState com persistência automática em localStorage.
 * Retorna [valor, setValor] — a mesma assinatura de useState.
 */
function useLocalStorage(key, initialValue) {
  const [value, setValue] = useState(() => loadJSON(key, initialValue));

  const set = useCallback(
    (next) => {
      setValue((prev) => {
        const resolved = typeof next === 'function' ? next(prev) : next;
        saveJSON(key, resolved);
        return resolved;
      });
    },
    [key],
  );

  return [value, set];
}


/* ===== hooks/useTheme.js ===== */

const KEY = 'sd_theme';

/**
 * Tema claro/escuro persistido. `temaInicial` ('escuro' | 'claro')
 * define o padrão apenas quando não há preferência salva.
 * Retorna { dark, toggle }.
 */
function useTheme(temaInicial = 'escuro') {
  const [dark, setDark] = useState(() => {
    const saved = loadJSON(KEY, null);
    if (saved === 'light') return false;
    if (saved === 'dark') return true;
    return temaInicial !== 'claro';
  });

  const toggle = useCallback(() => {
    setDark((prev) => {
      const next = !prev;
      saveJSON(KEY, next ? 'dark' : 'light');
      return next;
    });
  }, []);

  return { dark, toggle };
}


/* ===== hooks/useCart.js ===== */

/**
 * Carrinho de compras em memória.
 * Cada linha: { id, n, p, v, qty }.
 */
function useCart() {
  const [items, setItems] = useState([]);

  const add = useCallback((it) => {
    setItems((cart) => {
      const existing = cart.find((c) => c.id === it.id);
      if (existing) {
        return cart.map((c) => (c.id === it.id ? { ...c, qty: c.qty + 1 } : c));
      }
      return [...cart, { id: it.id, n: it.n, p: it.p, v: it.v, qty: 1 }];
    });
  }, []);

  const inc = useCallback((id) => {
    setItems((cart) => cart.map((c) => (c.id === id ? { ...c, qty: c.qty + 1 } : c)));
  }, []);

  const dec = useCallback((id) => {
    setItems((cart) =>
      cart.flatMap((c) =>
        c.id === id ? (c.qty > 1 ? [{ ...c, qty: c.qty - 1 }] : []) : [c],
      ),
    );
  }, []);

  const clear = useCallback(() => setItems([]), []);

  const count = useMemo(() => items.reduce((a, i) => a + i.qty, 0), [items]);
  const total = useMemo(() => items.reduce((a, i) => a + i.p * i.qty, 0), [items]);

  const qtyOf = useCallback(
    (id) => {
      const c = items.find((x) => x.id === id);
      return c ? c.qty : 0;
    },
    [items],
  );

  return { items, add, inc, dec, clear, count, total, qtyOf };
}


/* ===== hooks/useOrders.js ===== */

const ORDERS_KEY = 'sd_orders';
const SEEN_KEY = 'sd_seen';

/** Um pedido já está pronto para retirada? */
function isReady(o) {
  return Date.now() >= o.ts + (o.prepMs || 0);
}

/**
 * Pedidos + notificações.
 * - Persiste pedidos e ids "vistos" em localStorage.
 * - Agenda um timer por pedido que dispara um toast quando fica pronto.
 *
 * Retorna: { orders, addOrder, seen, markSeen, toasts, dismissToast,
 *            notifNewIds, setNotifNewIds }.
 */
function useOrders() {
  const [orders, setOrders] = useState(() => loadJSON(ORDERS_KEY, []));
  const [seen, setSeen] = useState(() => loadJSON(SEEN_KEY, []));
  const [toasts, setToasts] = useState([]);
  const [notifNewIds, setNotifNewIds] = useState([]);
  const timers = useRef({});

  const dismissToast = useCallback((id) => {
    setToasts((ts) => ts.filter((t) => t.id !== id));
  }, []);

  const notifyReady = useCallback(
    (o) => {
      setToasts((ts) => (ts.some((t) => t.id === o.id) ? ts : [...ts, { id: o.id, senha: o.senha, name: o.name }]));
      setTimeout(() => dismissToast(o.id), 8000);
    },
    [dismissToast],
  );

  const scheduleReady = useCallback(
    (o) => {
      if (timers.current[o.id]) return;
      const remaining = o.ts + (o.prepMs || 0) - Date.now();
      if (remaining <= 0) return;
      timers.current[o.id] = setTimeout(() => {
        delete timers.current[o.id];
        notifyReady(o);
      }, remaining);
    },
    [notifyReady],
  );

  // Reagenda avisos de pedidos ainda em preparo ao montar / recarregar.
  useEffect(() => {
    orders.forEach(scheduleReady);
    const snapshot = timers.current;
    return () => Object.values(snapshot).forEach(clearTimeout);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const addOrder = useCallback(
    (order) => {
      setOrders((prev) => {
        const next = [order, ...prev];
        saveJSON(ORDERS_KEY, next);
        return next;
      });
      scheduleReady(order);
    },
    [scheduleReady],
  );

  const markSeen = useCallback((ids) => {
    setSeen((prev) => {
      const next = Array.from(new Set([...prev, ...ids]));
      saveJSON(SEEN_KEY, next);
      return next;
    });
  }, []);

  return {
    orders,
    addOrder,
    seen,
    markSeen,
    toasts,
    dismissToast,
    notifNewIds,
    setNotifNewIds,
  };
}


/* ===== components/ImageSlot.jsx ===== */

/**
 * Espaço de foto que o usuário preenche (clique ou arraste uma imagem).
 * A imagem é guardada como Data URL em localStorage, sob a chave `id`,
 * então persiste entre sessões. Substitua por <img src> vindo da API
 * quando integrar o back-end.
 *
 * Props:
 *  - id          chave única (persistência)
 *  - shape       'rect' | 'rounded' | 'circle'
 *  - radius      raio em px quando shape='rounded'
 *  - fit         'cover' | 'contain'
 *  - placeholder texto do estado vazio
 *  - style       estilos extra do contêiner
 */
function ImageSlot({
  id,
  shape = 'rect',
  radius = 0,
  fit = 'cover',
  placeholder = 'Adicionar foto',
  style = {},
}) {
  const [src, setSrc] = useLocalStorage('sd_img_' + id, '');
  const [over, setOver] = useState(false);
  const inputRef = useRef(null);

  const borderRadius =
    shape === 'circle' ? '50%' : shape === 'rounded' ? radius + 'px' : 0;

  function readFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = () => setSrc(String(reader.result));
    reader.readAsDataURL(file);
  }

  function onDrop(e) {
    e.preventDefault();
    setOver(false);
    readFile(e.dataTransfer.files && e.dataTransfer.files[0]);
  }

  return (
    <div
      onClick={() => inputRef.current && inputRef.current.click()}
      onDragOver={(e) => {
        e.preventDefault();
        setOver(true);
      }}
      onDragLeave={() => setOver(false)}
      onDrop={onDrop}
      style={{
        position: 'relative',
        overflow: 'hidden',
        borderRadius,
        background: 'var(--input)',
        cursor: 'pointer',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        boxShadow: over ? 'inset 0 0 0 2px #f5a623' : 'none',
        ...style,
      }}
    >
      {src ? (
        <img
          src={src}
          alt=""
          style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }}
        />
      ) : (
        <span
          style={{
            fontSize: '10px',
            fontWeight: 600,
            color: 'rgba(var(--ink),.35)',
            textAlign: 'center',
            padding: '4px 8px',
            lineHeight: 1.3,
            pointerEvents: 'none',
          }}
        >
          {placeholder}
        </span>
      )}
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        onChange={(e) => readFile(e.target.files && e.target.files[0])}
        style={{ display: 'none' }}
      />
    </div>
  );
}

              </div>

          ) : (
            <div style={{ marginTop: '14px', fontSize: '12px', lineHeight: 1.5, color: 'rgba(var(--ink),.5)', background: 'var(--surface-2)', borderRadius: '11px', padding: '11px 13px' }}>

            </div>

        <div style={{ flex: '0 0 auto', padding: '16px 20px calc(16px + env(safe-area-inset-bottom))', borderTop: '1px solid rgba(var(--ink),.08)', background: 'var(--sheet)' }}>

              border: 'none',
              borderRadius: '14px',
              background: '#f5a623',
              color: '#1a1206',

              fontWeight: 800,
              fontSize: '15px',
              cursor: 'pointer',
            }}

            {confirmLabel}
          </button>
        </div>
      </div>
    </>
  );
}

function qtyBtn(color) {

/**
 * Calendário de disponibilidade. Dias livres/parciais são clicáveis;
 * ocupados e passados ficam desabilitados.
 * Props: year, month, selectedDay, onSelectDay, onPrev, onNext.
 */
function Calendar({ year: y, month: m, selectedDay, onSelectDay, onPrev, onNext }) {
  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const atMinMonth = y === 2026 && m <= 5;

  const cellBase = {
    aspectRatio: '1 / 1',
    borderRadius: '11px',
    border: '1px solid transparent',
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    justifyContent: 'center',
    gap: '3px',
    fontFamily: 'Hanken Grotesk',
    fontWeight: 700,
    fontSize: '14px',
  };

  const cells = [];
  for (let i = 0; i < first; i++) {
    cells.push(<span key={'x' + i} style={{ ...cellBase, visibility: 'hidden' }} />);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const st = statusOf(y, m, d);
    const sel = selectedDay === d;
    const clickable = st === 'livre' || st === 'parcial';
    let style;
    if (st === 'past') style = { ...cellBase, background: 'transparent', color: 'rgba(var(--ink),.18)', cursor: 'default' };
    else if (st === 'ocupado') style = { ...cellBase, background: 'rgba(226,59,59,.08)', color: 'rgba(var(--ink),.3)', cursor: 'not-allowed' };
    else if (sel) style = { ...cellBase, background: '#f5a623', color: '#1a1206', cursor: 'pointer' };
    else style = { ...cellBase, background: 'var(--surface-2)', color: 'rgb(var(--ink))', cursor: 'pointer' };
    const showDot = (st === 'livre' || st === 'parcial' || st === 'ocupado') && !sel;
    cells.push(
      <button key={d} onClick={clickable ? () => onSelectDay(d) : undefined} style={style}>
        <span>{d}</span>
        {showDot && <span style={{ width: '5px', height: '5px', borderRadius: '50%', background: STATUS_COLOR[st] }} />}
      </button>,
    );
  }

  const navBtn = (disabled) => ({
    width: '34px',
    height: '34px',
    borderRadius: '10px',
    background: disabled ? 'var(--bg)' : 'var(--surface-2)',
    border: '1px solid rgba(var(--ink),.08)',
    color: disabled ? 'rgba(var(--ink),.2)' : 'rgb(var(--ink))',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    cursor: disabled ? 'default' : 'pointer',
  });

  return (
    <div style={{ background: 'var(--bg-2)', border: '1px solid rgba(var(--ink),.08)', borderRadius: '18px', padding: '16px', marginBottom: '16px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '14px' }}>
        <button onClick={atMinMonth ? undefined : onPrev} style={navBtn(atMinMonth)}>
          <ChevronLeftIcon size={18} />
        </button>
        <span style={{ fontFamily: "'Bricolage Grotesque'", fontWeight: 800, fontSize: '16px' }}>
          {MESES[m]} {y}
        </span>
        <button onClick={onNext} style={navBtn(false)}>
          <ChevronRightIcon size={18} />
        </button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: '4px', marginBottom: '6px' }}>
        {['D', 'S', 'T', 'Q', 'Q', 'S', 'S'].map((w, i) => (
          <span key={i} style={{ textAlign: 'center', fontSize: '10px', fontWeight: 700, color: 'rgba(var(--ink),.35)' }}>
            {w}
          </span>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: '4px' }}>{cells}</div>

      <div style={{ display: 'flex', gap: '14px', marginTop: '14px', paddingTop: '13px', borderTop: '1px solid rgba(var(--ink),.07)' }}>
        {[
          ['Livre', '#b6e84c'],
          ['Parcial', '#f5a623'],
          ['Ocupado', '#e23b3b'],
        ].map(([label, color]) => (
          <div key={label} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
            <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: color }} />
            <span style={{ fontSize: '11px', color: 'rgba(var(--ink),.6)' }}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}


/* ===== screens/events/EventsScreen.jsx ===== */

const TIPOS = ['Casamento', 'Aniversário', 'Corporativo', 'Formatura', 'Confraternização', 'Outro'];
const SLOT_BASE = [
  ['Tarde', '14h às 18h'],
  ['Noite', '19h às 23h'],
  ['Madrugada', '23h às 03h'],
];

/**
 * Aba Eventos: agenda de disponibilidade + formulário de contratação.
 * Ao enviar, chama `onSubmit({ protocolo, date, slot, contact })`
 * — o App exibe o loading e o modal de confirmação.
 */
function EventsScreen({ onSubmit }) {
  const [year, setYear] = useState(2026);
  const [month, setMonth] = useState(5);
  const [day, setDay] = useState(null);
  const [slot, setSlot] = useState(null);
  const [ev, setEv] = useState({ nome: '', tel: '', email: '', tipo: 'Casamento', pessoas: '', local: '', obs: '' });

  const onEv = (field) => (e) => {
    const v = e.target.value;
    setEv((prev) => ({ ...prev, [field]: v }));
  };

  function selectDay(d) {
    setDay(d);
    setSlot(null);
  }
  function prevMonth() {
    if (year === 2026 && month <= 5) return;
    setMonth((m) => (m === 0 ? 11 : m - 1));
    if (month === 0) setYear((y) => y - 1);
    setDay(null);
    setSlot(null);
  }
  function nextMonth() {
    setMonth((m) => (m === 11 ? 0 : m + 1));
    if (month === 11) setYear((y) => y + 1);
    setDay(null);
    setSlot(null);
  }

  // Horários do dia selecionado (o segundo horário fica ocupado em dias parciais).
  let slots = [];
  if (day != null) {
    const st = statusOf(year, month, day);
    if (st === 'livre' || st === 'parcial') {
      slots = SLOT_BASE.map(([label, time], i) => ({ label, time, taken: st === 'parcial' && i === 1 }));
    }
  }
  const hasDay = day != null && slots.length > 0;

  const canSubmit = !!(ev.nome && ev.tel && day != null && slot);

  function submit() {
    if (!canSubmit) return;
    const protocolo = 'SD-' + String(day).padStart(2, '0') + MESES_ABR[month].toUpperCase() + '-' + (Math.floor(Math.random() * 900) + 100);
    onSubmit({ protocolo, date: `${day} de ${MESES[month]}`, slot, contact: ev.tel });
  }

  const inputStyle = {
    width: '100%',
    boxSizing: 'border-box',
    padding: '13px 15px',
    borderRadius: '12px',
    background: 'var(--input)',
    border: '1px solid rgba(var(--ink),.1)',
    color: 'rgb(var(--ink))',
    fontFamily: 'Hanken Grotesk',
    fontSize: '14px',
    fontWeight: 500,
  };
  const tipoBase = {
    padding: '9px 14px',
    borderRadius: '999px',
    cursor: 'pointer',
    fontFamily: 'Hanken Grotesk',
    fontWeight: 700,
    fontSize: '12px',
    whiteSpace: 'nowrap',
    flex: '0 0 auto',
    border: '1px solid rgba(var(--ink),.1)',
  };

  return (
    <div style={{ padding: '6px 20px 0' }}>
      <span style={{ fontWeight: 700, fontSize: '10px', letterSpacing: '3px', color: '#f5a623' }}>AGENDAMENTO</span>
      <h2 style={{ fontFamily: "'Bricolage Grotesque'", fontWeight: 800, fontSize: '26px', margin: '8px 0 6px', letterSpacing: '-.5px' }}>
        Contrate a equipe
      </h2>
      <p style={{ fontSize: '13px', lineHeight: 1.5, color: 'rgba(var(--ink),.55)', margin: '0 0 18px' }}>
        Barmans e o trailer no seu evento — casamentos, aniversários, festas e corporativos. Escolha uma data livre na agenda.
      </p>

      <Calendar
        year={year}
        month={month}
        selectedDay={day}
        onSelectDay={selectDay}
        onPrev={prevMonth}
        onNext={nextMonth}
      />

      {hasDay ? (
        <div>
          <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '10px' }}>Horários para {day} de {MESES[month]}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '18px' }}>
            {slots.map(({ label, time, taken }) => {
              const sel = slot === label;
              const sBase = {
                width: '100%',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                padding: '13px 15px',
                borderRadius: '13px',
                cursor: taken ? 'not-allowed' : 'pointer',
                fontFamily: 'Hanken Grotesk',
                textAlign: 'left',
                border: '1px solid rgba(var(--ink),.1)',
                color: 'rgb(var(--ink))',
              };
              let style;
              if (taken) style = { ...sBase, background: 'rgba(226,59,59,.07)', color: 'rgba(var(--ink),.4)', borderColor: 'transparent' };
              else if (sel) style = { ...sBase, background: 'rgba(245,166,35,.14)', borderColor: '#f5a623' };
              else style = { ...sBase, background: 'var(--surface)' };
              return (
                <button key={label} onClick={taken ? undefined : () => setSlot(label)} style={style}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                    <span
                      style={{
                        width: '18px',
                        height: '18px',
                        borderRadius: '50%',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        flex: '0 0 auto',
                        border: sel ? '2px solid #f5a623' : taken ? '2px solid rgba(var(--ink),.15)' : '2px solid rgba(var(--ink),.28)',
                      }}
                    >
                      {sel && <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#f5a623' }} />}
                    </span>
                    <span style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: '2px' }}>
                      <span style={{ fontWeight: 700, fontSize: '14px' }}>{label}</span>
                      <span style={{ fontSize: '11px', opacity: 0.7 }}>{time}</span>
                    </span>
                  </span>
                  <span
                    style={{
                      fontSize: '11px',
                      fontWeight: 800,
                      padding: '4px 10px',
                      borderRadius: '999px',
                      background: taken ? 'rgba(226,59,59,.16)' : 'rgba(182,232,76,.16)',
                      color: taken ? '#e23b3b' : '#b6e84c',
                    }}
                  >
                    {taken ? 'Ocupado' : 'Livre'}
                  </span>
                </button>
              );
            })}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '13px' }}>
            <div style={{ fontWeight: 700, fontSize: '13px' }}>Dados do evento</div>
            <input value={ev.nome} onChange={onEv('nome')} placeholder="Seu nome *" style={inputStyle} />
            <div style={{ display: 'flex', gap: '10px' }}>
              <input value={ev.tel} onChange={onEv('tel')} placeholder="WhatsApp *" style={inputStyle} />
              <input value={ev.pessoas} onChange={onEv('pessoas')} placeholder="Nº pessoas" style={inputStyle} />
            </div>
            <input value={ev.email} onChange={onEv('email')} placeholder="E-mail" style={inputStyle} />
            <input value={ev.local} onChange={onEv('local')} placeholder="Local / endereço do evento" style={inputStyle} />

            <div>
              <div style={{ fontSize: '12px', fontWeight: 600, color: 'rgba(var(--ink),.5)', marginBottom: '8px' }}>Tipo de evento</div>
              <div className="sd-scroll" style={{ display: 'flex', gap: '8px', overflowX: 'auto', paddingBottom: '2px' }}>
                {TIPOS.map((t) => (
                  <button
                    key={t}
                    onClick={() => setEv((prev) => ({ ...prev, tipo: t }))}
                    style={
                      ev.tipo === t
                        ? { ...tipoBase, background: '#f5a623', color: '#1a1206', borderColor: '#f5a623' }
                        : { ...tipoBase, background: 'var(--surface)', color: 'rgba(var(--ink),.7)' }
                    }
                  >
                    {t}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <div style={{ fontSize: '12px', fontWeight: 600, color: 'rgba(var(--ink),.5)', marginBottom: '8px' }}>Conte sobre o evento</div>
              <textarea
                value={ev.obs}
                onChange={onEv('obs')}
                placeholder="Tipo de pacote, bebidas desejadas, duração, estrutura do local, nº de bartenders..."
                rows={4}
                style={{ ...inputStyle, minHeight: '94px', lineHeight: 1.5, resize: 'none', boxShadow: 'inset 0 2px 5px rgba(0,0,0,.18)' }}
              />
            </div>

            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: '10px',
                background: 'rgba(245,166,35,.1)',
                border: '1px solid rgba(245,166,35,.24)',
                borderRadius: '12px',
                padding: '12px 13px',
              }}
            >
              <span style={{ display: 'flex', color: '#f5a623', flex: '0 0 auto' }}>
                <PhoneIcon size={19} />
              </span>
              <span style={{ fontSize: '12.5px', fontWeight: 600, lineHeight: 1.4, color: 'rgba(var(--ink),.75)' }}>
                Nossa equipe entrará em contato para confirmação.
              </span>
            </div>

            <button
              onClick={submit}
              disabled={!canSubmit}
              style={{
                width: '100%',
                padding: '15px',
                border: 'none',
                borderRadius: '14px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '9px',
                background: canSubmit ? '#f5a623' : 'var(--surface-2)',
                color: canSubmit ? '#1a1206' : 'rgba(var(--ink),.4)',
                fontFamily: 'Hanken Grotesk',
                fontWeight: 800,
                fontSize: '15px',
                cursor: canSubmit ? 'pointer' : 'not-allowed',
                boxShadow: canSubmit ? '0 8px 22px rgba(245,166,35,.28)' : 'none',
                transition: 'background-color .2s ease, box-shadow .2s ease',
              }}
            >
              <CalendarCheckIcon size={18} />
              Solicitar agendamento
            </button>
            <p style={{ fontSize: '11px', lineHeight: 1.5, color: 'rgba(var(--ink),.4)', textAlign: 'center', margin: 0 }}>
              Sua solicitação é analisada em até 24h. Nossa equipe entrará em contato para confirmar.
            </p>
          </div>
        </div>
      ) : (
        <div style={{ textAlign: 'center', padding: '14px 20px 30px', color: 'rgba(var(--ink),.4)', fontSize: '13px' }}>
          Selecione um dia livre ou parcial para ver os horários.
        </div>
      )}
    </div>
  );
}

          Nenhuma bebida encontrada.

    </div>
  );
}

/* ===== App.jsx ===== */



/**
 * App raiz do Summer Drinks.
 *
 * Props (todas opcionais):
 *  - defaultTab      'cardapio' | 'pedidos' | 'eventos' | 'contato'
 *  - temaInicial     'escuro' | 'claro'  (usado se não houver preferência salva)
 *  - aberta          boolean — status Aberto/Fechado no cabeçalho
 *  - payNowDefault   boolean — "Pagar agora" pré-selecionado no checkout
 *  - prepSegundos    number  — tempo de preparo até o pedido ficar pronto
 */
function App({
  defaultTab = 'cardapio',
  temaInicial = 'escuro',
  aberta = true,
  payNowDefault = true,
  prepSegundos = 12,
}) {
  const [tab, setTab] = useState(defaultTab);
  const { dark, toggle } = useTheme(temaInicial);
  const cart = useCart();
  const { orders, addOrder, seen, markSeen, toasts, dismissToast, notifNewIds, setNotifNewIds } = useOrders();

  const [checkoutOpen, setCheckoutOpen] = useState(false);
  const [checkout, setCheckout] = useState({ payNow: payNowDefault, method: 'pix', custName: '' });
  const [order, setOrder] = useState(null); // pedido confirmado (tela de sucesso)
  const [evConfirm, setEvConfirm] = useState(null);
  const [loading, setLoading] = useState(null); // 'order' | 'event' | null
  const [notifOpen, setNotifOpen] = useState(false);

  const readyOrders = orders.filter(isReady);
  const unreadCount = readyOrders.filter((o) => !seen.includes(o.id)).length;

  function confirmOrder() {
    if (!cart.items.length) return;
    const senha = 'ABCDEFGH'[Math.floor(Math.random() * 8)] + String(Math.floor(Math.random() * 90) + 10);
    const prepMs = Math.max(3, prepSegundos) * 1000;
    const newOrder = {
      id: Date.now(),
      ts: Date.now(),
      prepMs,
      senha,
      items: cart.items,
      total: cart.total,
      method: checkout.method,
      payNow: checkout.payNow,
      name: checkout.custName,
    };
    setCheckoutOpen(false);
    setLoading('order');
    setTimeout(() => {
      addOrder(newOrder);
      cart.clear();
      setOrder(newOrder);
      setLoading(null);
    }, 1100);
  }

  function submitEvent(data) {
    setLoading('event');
    setTimeout(() => {
      setEvConfirm(data);
      setLoading(null);
    }, 1100);
  }

  function openBell() {
    const newIds = readyOrders.filter((o) => !seen.includes(o.id)).map((o) => o.id);
    markSeen(readyOrders.map((o) => o.id));
    setNotifNewIds(newIds);
    setNotifOpen(true);
  }

  const showCartBar = cart.items.length > 0 && !checkoutOpen && !order;

  return (
    <div
      className="sd-app"
      data-theme={dark ? 'dark' : 'light'}
      style={{
        minHeight: '100vh',
        background: 'radial-gradient(120% 80% at 50% 0%, var(--backdrop-2) 0%, var(--backdrop) 60%)',
        display: 'flex',
        justifyContent: 'center',
        alignItems: 'stretch',
        fontFamily: "'Hanken Grotesk',sans-serif",
      }}
    >
      <div
        style={{
          width: '100%',
          maxWidth: '440px',
          minHeight: '640px',
          height: '100dvh',
          background: 'var(--bg)',
          position: 'relative',
          overflow: 'hidden',
          display: 'flex',
          flexDirection: 'column',
          boxShadow: '0 0 90px rgba(0,0,0,.7)',
          color: 'rgb(var(--ink))',
        }}
      >
        <Header
          open={aberta}
          dark={dark}
          onToggleTheme={toggle}
          unreadCount={unreadCount}
          onBell={openBell}
        />

        <main className="sd-scroll" style={{ flex: '1 1 auto', overflowY: 'auto', WebkitOverflowScrolling: 'touch', padding: '0 0 150px' }}>
          {tab === 'cardapio' && <MenuScreen featured={FEATURED} onAdd={cart.add} qtyOf={cart.qtyOf} />}
          {tab === 'pedidos' && <OrdersScreen orders={orders} onGoCardapio={() => setTab('cardapio')} />}
          {tab === 'eventos' && <EventsScreen onSubmit={submitEvent} />}
          {tab === 'contato' && <ContactScreen />}
        </main>

        <Toasts
          toasts={toasts}
          onOpen={(t) => {
            setTab('pedidos');
            dismissToast(t.id);
          }}
          onDismiss={dismissToast}
        />

        {notifOpen && (
          <NotificationPanel
            orders={orders}
            notifNewIds={notifNewIds}
            onClose={() => setNotifOpen(false)}
            onGoPedidos={() => {
              setTab('pedidos');
              setNotifOpen(false);
            }}
          />
        )}

        {showCartBar && <CartBar count={cart.count} total={cart.total} onOpen={() => setCheckoutOpen(true)} />}

        <BottomNav tab={tab} onTab={setTab} orderCount={orders.length} />

        {loading && (
          <Loading
            message={loading === 'order' ? 'Gerando sua comanda' : 'Enviando solicitação'}
            sub={loading === 'order' ? 'Confirmando seu pedido para retirada...' : 'Processaremos sua agenda em até 24h...'}
          />
        )}

        {checkoutOpen && (
          <CheckoutSheet
            cart={cart}
            total={cart.total}
            checkout={checkout}
            setCheckout={setCheckout}
            onClose={() => setCheckoutOpen(false)}
            onConfirm={confirmOrder}
          />
        )}

        {order && (
          <OrderSuccess
            order={order}
            onClose={() => {
              setOrder(null);
              setCheckout((c) => ({ ...c, custName: '' }));
            }}
          />
        )}

        {evConfirm && <EventConfirm data={evConfirm} onClose={() => setEvConfirm(null)} />}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
<script>
(function(){
  function boot(){
    var src = document.getElementById('appsrc').textContent;
    try {
      var code = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
      new Function('React','ReactDOM', code)(window.React, window.ReactDOM);
    } catch (e) {
      document.getElementById('root').innerHTML =
        '<pre style="color:#ff8a80;white-space:pre-wrap;padding:16px;font:12px ui-monospace,monospace">'+
        (e && (e.stack||e.message) || e)+'</pre>';
    }
  }
  if (document.readyState !== 'loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
